name: Telegram Notify
description: Send a Telegram notification about CI/CD status

inputs:
  bot-token:
    description: Telegram bot token
    required: true
  channel-id:
    description: Telegram channel/chat ID
    required: true
  status:
    description: "Status: success or failure"
    required: true
  title:
    description: Notification title (e.g. "Tests Passed", "Deployed to Staging")
    required: true

runs:
  using: composite
  steps:
    - name: Send Telegram notification
      shell: bash
      run: |
        if [ "${{ inputs.status }}" = "success" ]; then
          ICON="✅"
        elif [ "${{ inputs.status }}" = "failure" ]; then
          ICON="❌"
        else
          ICON="⚠️"
        fi

        curl -s -X POST "https://api.telegram.org/bot${{ inputs.bot-token }}/sendMessage" \
          -d chat_id=${{ inputs.channel-id }} \
          -d parse_mode=HTML \
          -d text="${ICON} <b>${{ inputs.title }}</b>%0A%0A📦 <code>${{ github.repository }}</code>%0A🔀 <code>${{ github.ref_name }}</code>%0A👤 ${{ github.actor }}%0A%0A<a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Run</a>"
